<!DOCTYPE html>
<!-- This is the UI for the modal endpoint I'm using to estimate training cost. -->
<head>
  <title>PyTorch Training Cost Estimator</title>
</head>
<body>

  <!--------------------------------------------------------------------------->
  <!-- title -->
  <div>
    <h1>PyTorch Training Cost Estimator</h1>
    <p>This tool helps developers training PyTorch models figure out which GPU is most cost effective.</p>
    <p>The tool profiles training a model across different GPUs and estimates the training cost per epoch for each GPU.</p>
  </div>

  <hr>

  <!--------------------------------------------------------------------------->
  <!-- examples for user to select from -->
  <div>
    <h2>Examples</h2>
    <div id="presets">
      <button onclick="fillPreset('mlp')">MLP</button>
      <button onclick="fillPreset('alexnet')">Alex Net</button>
      <button onclick="fillPreset('resnet50')">ResNet-50</button>
      <button onclick="fillPreset('transformer')">Transformer (Attention is All You Need)</button>
    </div>
  </div>

  <hr>

  <!--------------------------------------------------------------------------->
  <!-- form -->
  <div id="form">
    <div>
      <div>
        <label for="module">NN.Module (must be named `Model`):</label>
        <div>
          <textarea id="module" rows="10" cols="80" placeholder="PyTorch Module definition"></textarea>
        </div>
      </div>

      <div>
        <label for="input_shape">Input Shape (must set variable tuple `input_shape`):</label>
        <div>
          <textarea id="input_shape" rows="4" cols="80"></textarea>
        </div>
      </div>

      <div>
        <label for="loss_fn">Loss Function:</label>
        <input type="text" id="loss_fn"/>
      </div>

      <div>
        <label for="optimizer">Optimizer:</label>
        <input type="text" id="optimizer"/>
      </div>

      <div>
        <label for="num_examples">Number of training examples:</label>
        <input type="text" id="num_examples"/>
      </div>

      <!--
      <fieldset>
        <legend>Target Hardware</legend>
        <div>
          <input type="radio" id="T4" name="target_hardware" value="T4" checked />
          <label for="T4">T4 ($0.59 / hr)</label>
        </div>
        <div>
          <input type="radio" id="A10" name="target_hardware" value="A10" />
          <label for="A10">A10 ($1.10 / hr)</label>
        </div>
        <div>
          <input type="radio" id="A100-40GB" name="target_hardware" value="A100-40GB" />
          <label for="A100-40GB">A100 40GB ($2.10 / hr)</label>
        </div>
        <div>
          <input type="radio" id="H100" name="target_hardware" value="H100" />
          <label for="H100">H100 ($3.95 / hr)</label>
        </div>
        <div>
          <input type="radio" id="H200" name="target_hardware" value="H200" />
          <label for="H200">H200 ($4.54 / hr)</label>
        </div>
      </fieldset>
      -->

      <fieldset>
        <legend>Compiler Settings</legend>
        <div>
          <input type="radio" id="use-torch-compile" name="compile_option" checked />
          <label for="use-torch-compile">Use torch.compile (recommended)</label>
        </div>
        <div>
          <input type="radio" id="no-torch-compile" name="compile_option" />
          <label for="no-torch-compile">Don't use torch.compile</label>
        </div>
      </fieldset>

      <button id="submit" onclick="send_request()">Estimate Training Cost</button>
    </div>
  </div>

  <!--------------------------------------------------------------------------->
  <!-- response from API -->
  <div id="results-container">
    <table id="cost_table" border="1" hidden>
      <thead>
        <tr>
          <th>Hardware</th>
          <th>Price per Epoch</th>
        </tr>
      </thead>
      <tbody id="table_body"></tbody>
    </table>
  </div>

  <!--<h3>Raw JSON Output</h3>-->
  <pre id="json_output"></pre>
  <div id="error"></div>

  <!--------------------------------------------------------------------------->
  <!-- js -->
  <script src="script.js"></script>
</body>
</html>
